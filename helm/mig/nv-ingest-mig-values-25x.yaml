# MIG Values for NV-Ingest 25.9.0 and earlier (subchart format)
# For NV-Ingest 26.x, use nv-ingest-mig-values.yaml (NIM Operator format)

# Main NV-Ingest service resources - Using MIG
resources:
  limits:
    nvidia.com/gpu: 0              # Set GPU to 0 when using MIG
    nvidia.com/mig-1g.10gb: 1      # Use MIG instance
  requests:
    nvidia.com/gpu: 0              # Set GPU to 0 when using MIG
    nvidia.com/mig-1g.10gb: 1      # Use MIG instance

# Configure NIM components to use MIG
nemotron-page-elements-v3:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

nemotron-graphic-elements-v1:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

nemotron-table-structure-v1:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

nvidia-nim-llama-nemotron-embed-1b-v2:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

nemotron-ocr-v1:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

paddleocr-nim:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

# text-embedding-nim is disabled because we use llama-nemotron-embed-1b-v2 for embedding
text-embedding-nim:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

# If you want to deploy llama-nemotron-rerank-1b-v2
llama-nemotron-rerank-1b-v2:
  resources:
    limits:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1
    requests:
      nvidia.com/gpu: 0
      nvidia.com/mig-1g.10gb: 1

# Configure Milvus to use MIG
milvus:
  standalone:
    resources:
      limits:
        nvidia.com/gpu: 0
        nvidia.com/mig-1g.10gb: 1
      requests:
        nvidia.com/gpu: 0
        nvidia.com/mig-1g.10gb: 1
