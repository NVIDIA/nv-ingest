# Harness config for nemo_retriever benchmarks.

active:
  dataset: jp20
  preset: single_gpu
  query_csv: data/jp20_query_gt.csv
  input_type: pdf
  recall_required: true
  recall_match_mode: pdf_page
  recall_adapter: none
  artifacts_dir: null
  ray_address: null
  lancedb_uri: lancedb
  hybrid: false
  embed_model_name: nvidia/llama-nemotron-embed-1b-v2
  write_detection_file: false

presets:
  fixed_common:
    pdf_extract_num_cpus: 2.0
    pdf_extract_batch_size: 4
    pdf_split_batch_size: 1
    ocr_batch_size: 16
    embed_batch_size: 256
    page_elements_cpus_per_actor: 1.0
    ocr_cpus_per_actor: 1.0
    embed_cpus_per_actor: 1.0
    gpu_page_elements: 0.1
    gpu_ocr: 0.1
    gpu_embed: 0.25

  single_gpu:
    extends: fixed_common
    pdf_extract_workers: 8
    page_elements_batch_size: 4
    page_elements_workers: 3
    ocr_workers: 3
    embed_workers: 3

  dgx_8gpu:
    extends: single_gpu
    pdf_extract_workers: 64
    page_elements_batch_size: 32
    page_elements_workers: 24
    ocr_workers: 24
    embed_workers: 24

  # Keep the same conservative single-GPU batch sizes, but let batch mode
  # discover actor/task counts from the current Ray GPU inventory.
  auto_workers:
    extends: single_gpu
    pdf_extract_workers: auto
    page_elements_workers: auto
    ocr_workers: auto
    embed_workers: auto

datasets:
  bo20:
    path: /datasets/nv-ingest/bo20
    query_csv: null
    input_type: pdf
    recall_required: false

  bo767:
    path: /datasets/nv-ingest/bo767
    query_csv: data/bo767_query_gt.csv
    input_type: pdf
    recall_required: true

  jp20:
    path: /datasets/nv-ingest/jp20
    query_csv: data/jp20_query_gt.csv
    input_type: pdf
    recall_required: true
    recall_match_mode: pdf_page
    recall_adapter: none

  earnings:
    path: /datasets/nv-ingest/earnings_consulting
    query_csv: data/earnings_consulting_multimodal.csv
    input_type: pdf
    recall_required: true
    recall_match_mode: pdf_page
    recall_adapter: page_plus_one

  # Wiring for bo10k-style CSVs with zero-based page numbers.
  # Keep recall optional by default until a local query CSV path is configured.
  bo10k:
    path: /datasets/nv-ingest/bo10k
    query_csv: null
    input_type: pdf
    recall_required: false
    recall_match_mode: pdf_page
    recall_adapter: page_plus_one

  # FinanceBench is document-level recall using the repository fixture JSON.
  financebench:
    path: /datasets/nv-ingest/financebench
    query_csv: data/financebench_train.json
    input_type: pdf
    recall_required: true
    recall_match_mode: pdf_only
    recall_adapter: financebench_json
